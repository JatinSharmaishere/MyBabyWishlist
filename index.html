<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Her Wishlist 🌸"/>
<title>Her Wishlist 🌸</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Georgia',serif;background:linear-gradient(160deg,#fff0f6 0%,#fce4f0 40%,#f9d8eb 100%);min-height:100vh;}
  input,button{font-family:'Georgia',serif;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#f4b0d0;border-radius:10px;}
  @keyframes floatDown{0%{transform:translateY(-2rem) rotate(0deg);opacity:0;}10%{opacity:0.35;}90%{opacity:0.35;}100%{transform:translateY(100vh) rotate(360deg);opacity:0;}}
  @keyframes popIn{0%{transform:scale(0.7);opacity:0;}70%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
  @keyframes slideDown{0%{max-height:0;opacity:0;transform:translateY(-8px);}100%{max-height:2000px;opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  .tabs-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:24px;scrollbar-width:none;}
  .tabs-scroll::-webkit-scrollbar{display:none;}
  .petal{position:fixed;top:-2rem;pointer-events:none;animation:floatDown linear infinite;opacity:0.35;}
  .metric-card{flex:1 1 140px;background:linear-gradient(135deg,#fff0f6 0%,#ffe4f0 100%);border:1.5px solid #f4c0d8;border-radius:18px;padding:14px 18px;text-align:center;box-shadow:0 2px 12px rgba(220,100,150,0.10);}
  .link-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;animation:popIn 0.35s ease;box-shadow:0 2px 8px rgba(200,100,150,0.08);transition:box-shadow 0.2s;}
  .link-card:hover{box-shadow:0 4px 18px rgba(200,100,150,0.18);}
  .cat-panel{border-radius:20px;margin-bottom:12px;overflow:hidden;transition:all 0.3s cubic-bezier(.4,0,.2,1);}
  .cat-btn{width:100%;display:flex;align-items:center;gap:12px;padding:16px 20px;background:transparent;border:none;cursor:pointer;text-align:left;}
  .cat-body{padding:0 20px 18px;animation:slideDown 0.3s ease;}
  .add-link-btn{width:100%;padding:10px;border-radius:14px;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;font-family:'Georgia',serif;}
  .save-btn{flex:1;color:#fff;border:none;border-radius:12px;padding:10px;font-weight:700;font-size:0.9rem;cursor:pointer;transition:transform 0.15s;font-family:'Georgia',serif;}
  .save-btn:hover{transform:scale(1.02);}
  .cancel-btn{padding:10px 16px;background:#fff;border:1.5px solid #f4b0d0;border-radius:12px;color:#c06090;font-weight:600;font-size:0.85rem;cursor:pointer;font-family:'Georgia',serif;}
  .tab-pill{flex-shrink:0;padding:7px 14px;border-radius:50px;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:'Georgia',serif;}
  .copy-btn{background:#fde8f4;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:0.75rem;color:#b5245c;font-weight:600;transition:background 0.2s;font-family:'Georgia',serif;}
  .del-btn{background:#fff0f4;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:0.75rem;color:#e57090;font-weight:600;font-family:'Georgia',serif;}
  .form-box{background:linear-gradient(135deg,#fff0f6,#fde8f2);border:1.5px solid #f4c0d8;border-radius:16px;padding:16px;animation:popIn 0.3s ease;}
  .form-input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #f4b0d0;font-size:0.86rem;outline:none;background:#fff;color:#8b3060;font-family:'Georgia',serif;}
  .form-label{display:block;font-size:0.78rem;color:#c06090;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
  .empty-state{text-align:center;padding:18px 0;color:#d4a0b8;font-size:0.85rem;}
  .search-wrap{position:relative;margin-bottom:20px;}
  .search-input{width:100%;padding:12px 14px 12px 40px;border-radius:50px;border:1.5px solid #f4b0d0;background:#fff;font-size:0.9rem;color:#8b3060;outline:none;box-shadow:0 2px 12px rgba(200,100,150,0.10);font-family:'Georgia',serif;}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}
  .sword-badge{background:#1a3a1a;border:1px solid #3a7a3a;border-radius:20px;padding:3px 10px;font-size:0.7rem;color:#8fd88f;font-weight:600;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATEGORIES = [
  { id:"makeup",     label:"Makeup",             emoji:"💄", color:"#f4a0b5", light:"#fde8f0" },
  { id:"skincare",   label:"Skincare & Beauty",  emoji:"✨", color:"#e8a0c8", light:"#fce8f6" },
  { id:"dress",      label:"Dresses",             emoji:"👗", color:"#d48fb0", light:"#fae0ef" },
  { id:"tops",       label:"Tops & Blouses",      emoji:"👚", color:"#c97aad", light:"#f7d6ee" },
  { id:"bottoms",    label:"Bottoms",             emoji:"👖", color:"#b86fa2", light:"#f3ccec" },
  { id:"traditional",label:"Traditional Wear",   emoji:"🥻", color:"#a86298", light:"#f0c4e8" },
  { id:"accessories",label:"Accessories",         emoji:"👜", color:"#e8a0b4", light:"#fde8f0" },
  { id:"shoes",      label:"Shoes & Heels",       emoji:"👠", color:"#d490a8", light:"#fad8e8" },
  { id:"jewellery",  label:"Jewellery",           emoji:"💍", color:"#c880a0", light:"#f6d0e4" },
  { id:"hygiene",    label:"Hygiene & Self-care", emoji:"🧴", color:"#de9fc0", light:"#fce4f2" },
];

const HEARTS = ["💗","💕","💖","💝","🌸","✿"];
const FLOATIES = ["🌸","💕","✨","💗","🌷","💖","🦋","🌺","⚓","🏴‍☠️","🌸","💕"];

function FloatingPetals() {
  useEffect(() => {
    const container = document.getElementById('petals-container');
    FLOATIES.forEach((emoji, i) => {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = emoji;
      el.style.left = `${(i * 8.3) + (Math.random()*5)}%`;
      el.style.animationDelay = `${i * 0.7}s`;
      el.style.animationDuration = `${6 + (i % 4)}s`;
      el.style.fontSize = i % 3 === 0 ? '1.4rem' : i % 2 === 0 ? '1rem' : '0.8rem';
      container.appendChild(el);
    });
  }, []);
  return <div id="petals-container" style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',overflow:'hidden',zIndex:0}} />;
}

function MetricsBar({ items }) {
  const allItems = Object.values(items).flat();
  const total = allItems.length;
  const totalPrice = allItems.reduce((s,i) => s + (parseFloat(i.price)||0), 0);
  const catCount = Object.values(items).filter(a => a.length > 0).length;
  const metrics = [
    { label:"Total Wishlist Items", value:total, emoji:"🛍️" },
    { label:"Categories Used",      value:`${catCount} / ${CATEGORIES.length}`, emoji:"📂" },
    { label:"Total Value",          value:totalPrice > 0 ? `₹${totalPrice.toLocaleString('en-IN')}` : "—", emoji:"💰" },
  ];
  return (
    <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'28px',animation:'popIn 0.5s ease'}}>
      {metrics.map(m => (
        <div key={m.label} className="metric-card">
          <div style={{fontSize:'1.5rem',marginBottom:'4px'}}>{m.emoji}</div>
          <div style={{fontSize:'1.5rem',fontWeight:700,color:'#c2185b',letterSpacing:'-0.5px'}}>{m.value}</div>
          <div style={{fontSize:'0.72rem',color:'#c06090',marginTop:'2px',letterSpacing:'0.4px',textTransform:'uppercase',fontWeight:600}}>{m.label}</div>
        </div>
      ))}
    </div>
  );
}

function LinkCard({ item, onDelete, catColor }) {
  const [copied, setCopied] = useState(false);
  const heart = HEARTS[Math.floor(Math.random() * HEARTS.length)];
  const handleCopy = () => {
    navigator.clipboard.writeText(item.url).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
  };
  const short = item.url.length > 48 ? item.url.slice(0,48) + '…' : item.url;
  return (
    <div className="link-card" style={{borderLeft:`4px solid ${catColor}`,border:`1.5px solid ${catColor}44`,borderLeft:`4px solid ${catColor}`}}>
      <div style={{fontSize:'1.1rem',marginTop:'1px',flexShrink:0}}>{heart}</div>
      <div style={{flex:1,minWidth:0}}>
        <a href={item.url} target="_blank" rel="noopener noreferrer"
          style={{color:'#b5245c',fontSize:'0.82rem',wordBreak:'break-all',textDecoration:'none',display:'block',marginBottom:'4px',fontWeight:500}}>
          {short}
        </a>
        {item.note && <div style={{fontSize:'0.78rem',color:'#c07090',marginBottom:'4px',fontStyle:'italic'}}>📝 {item.note}</div>}
        {item.price && <div style={{display:'inline-block',background:'linear-gradient(90deg,#fce4f0,#f9d0e8)',color:'#b5245c',fontSize:'0.78rem',padding:'2px 10px',borderRadius:'20px',fontWeight:700,border:'1px solid #f4b0d0'}}>₹{parseFloat(item.price).toLocaleString('en-IN')}</div>}
        <div style={{fontSize:'0.72rem',color:'#d4a0b8',marginTop:'4px'}}>{item.date}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'6px',flexShrink:0}}>
        <button className="copy-btn" onClick={handleCopy} style={{background:copied?'#f4c0d8':'#fde8f4'}}>{copied?'✓ Copied':'Copy'}</button>
        <button className="del-btn" onClick={onDelete}>✕</button>
      </div>
    </div>
  );
}

function CategoryPanel({ cat, items, onAdd, onDelete }) {
  const [open, setOpen] = useState(false);
  const [url, setUrl] = useState('');
  const [price, setPrice] = useState('');
  const [note, setNote] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [err, setErr] = useState('');
  const inputRef = useRef();
  const catItems = items[cat.id] || [];

  const handleAdd = () => {
    if (!url.trim()) { setErr('Please paste a link first 🌸'); return; }
    try { new URL(url.trim()); } catch { setErr("Hmm, that doesn't look like a valid link 🤔"); return; }
    onAdd({ url:url.trim(), price:price.trim(), note:note.trim(), date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) });
    setUrl(''); setPrice(''); setNote(''); setErr(''); setShowForm(false);
  };

  return (
    <div className="cat-panel" style={{
      background: open ? `linear-gradient(135deg,${cat.light} 0%,#fff 60%)` : '#fff',
      border: `1.5px solid ${open ? cat.color+'88' : '#f0d0e0'}`,
      boxShadow: open ? `0 6px 24px ${cat.color}28` : '0 2px 8px rgba(200,100,150,0.07)',
    }}>
      <button className="cat-btn" onClick={() => { setOpen(o=>!o); setShowForm(false); }}>
        <span style={{fontSize:'1.6rem'}}>{cat.emoji}</span>
        <span style={{flex:1,fontWeight:700,fontSize:'0.98rem',color:open?cat.color:'#8b3060'}}>{cat.label}</span>
        {catItems.length > 0 && (
          <span style={{background:`linear-gradient(135deg,${cat.color},${cat.color}cc)`,color:'#fff',borderRadius:'20px',padding:'2px 10px',fontSize:'0.76rem',fontWeight:700}}>
            {catItems.length} {catItems.length===1?'item':'items'}
          </span>
        )}
        <span style={{fontSize:'1rem',color:cat.color,transform:open?'rotate(180deg)':'rotate(0)',transition:'transform 0.3s',flexShrink:0}}>▾</span>
      </button>

      {open && (
        <div className="cat-body">
          {catItems.length===0 && !showForm && (
            <div className="empty-state">
              <div style={{fontSize:'2rem',marginBottom:'6px'}}>🛒</div>
              Nothing saved yet — add your first find!
            </div>
          )}
          {catItems.map((item,i) => (
            <LinkCard key={i} item={item} catColor={cat.color} onDelete={() => onDelete(cat.id,i)} />
          ))}

          {showForm ? (
            <div className="form-box">
              <div style={{marginBottom:'10px'}}>
                <label className="form-label">Paste Product Link 🔗</label>
                <input ref={inputRef} className="form-input" value={url}
                  onChange={e=>{setUrl(e.target.value);setErr('');}} placeholder="https://..." />
              </div>
              <div style={{display:'flex',gap:'10px',marginBottom:'10px'}}>
                <div style={{flex:1}}>
                  <label className="form-label">Price (₹)</label>
                  <input className="form-input" value={price} onChange={e=>setPrice(e.target.value)} type="number" placeholder="e.g. 1299" />
                </div>
                <div style={{flex:2}}>
                  <label className="form-label">Note (optional)</label>
                  <input className="form-input" value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Size M, in red" />
                </div>
              </div>
              {err && <div style={{color:'#e05070',fontSize:'0.8rem',marginBottom:'8px'}}>{err}</div>}
              <div style={{display:'flex',gap:'8px'}}>
                <button className="save-btn" onClick={handleAdd}
                  style={{background:`linear-gradient(135deg,${cat.color},${cat.color}bb)`,boxShadow:`0 3px 10px ${cat.color}55`}}>
                  💖 Save to Wishlist
                </button>
                <button className="cancel-btn" onClick={()=>{setShowForm(false);setErr('');setUrl('');setPrice('');setNote('');}}>Cancel</button>
              </div>
            </div>
          ) : (
            <button className="add-link-btn"
              style={{background:cat.light,border:`1.5px dashed ${cat.color}88`,color:cat.color,marginTop:catItems.length>0?'8px':'0'}}
              onMouseEnter={e=>{e.currentTarget.style.background=cat.color;e.currentTarget.style.color='#fff';e.currentTarget.style.borderStyle='solid';}}
              onMouseLeave={e=>{e.currentTarget.style.background=cat.light;e.currentTarget.style.color=cat.color;e.currentTarget.style.borderStyle='dashed';}}
              onClick={()=>{setShowForm(true);setTimeout(()=>inputRef.current&&inputRef.current.focus(),100);}}>
              + Add a link
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [items, setItems] = useState(() => {
    try { const s = localStorage.getItem('her_wishlist_v1'); return s ? JSON.parse(s) : Object.fromEntries(CATEGORIES.map(c=>[c.id,[]])); }
    catch { return Object.fromEntries(CATEGORIES.map(c=>[c.id,[]])); }
  });
  const [search, setSearch] = useState('');
  const [activeTab, setActiveTab] = useState('all');

  useEffect(() => {
    try { localStorage.setItem('her_wishlist_v1', JSON.stringify(items)); } catch {}
  }, [items]);

  const handleAdd = (catId, item) => setItems(prev => ({...prev, [catId]:[...(prev[catId]||[]),item]}));
  const handleDelete = (catId, idx) => setItems(prev => ({...prev, [catId]:prev[catId].filter((_,i)=>i!==idx)}));

  const filteredCats = CATEGORIES.filter(c => {
    if (activeTab !== 'all' && c.id !== activeTab) return false;
    if (search) {
      const s = search.toLowerCase();
      return c.label.toLowerCase().includes(s) || (items[c.id]||[]).some(i=>i.url.toLowerCase().includes(s)||(i.note||'').toLowerCase().includes(s));
    }
    return true;
  });

  return (
    <div style={{minHeight:'100vh',position:'relative',fontFamily:"'Georgia',serif"}}>
      <FloatingPetals />
      <div style={{maxWidth:'720px',margin:'0 auto',padding:'36px 16px 60px',position:'relative',zIndex:1}}>

        {/* Header */}
        <div style={{textAlign:'center',marginBottom:'32px',position:'relative'}}>
          {/* Nami tangerine */}
          <svg width="44" height="44" viewBox="0 0 44 44" style={{position:'absolute',left:'0',top:'10px',opacity:0.7,animation:'pulse 4s infinite 0.5s'}}>
            <circle cx="22" cy="26" r="16" fill="#ff8c42"/>
            <ellipse cx="22" cy="12" rx="3" ry="6" fill="#4a8c3f"/>
            <ellipse cx="17" cy="13" rx="5" ry="2.5" fill="#4a8c3f" transform="rotate(-20 17 13)"/>
            <ellipse cx="27" cy="13" rx="5" ry="2.5" fill="#4a8c3f" transform="rotate(20 27 13)"/>
            <circle cx="18" cy="24" r="2" fill="#ff6b1a" opacity="0.5"/>
          </svg>
          {/* Luffy hat */}
          <svg width="52" height="32" viewBox="0 0 52 32" style={{position:'absolute',right:'0',top:'0px',opacity:0.7,animation:'pulse 3.5s infinite 1s'}}>
            <ellipse cx="26" cy="22" rx="24" ry="7" fill="#e8c840"/>
            <ellipse cx="26" cy="17" rx="14" ry="10" fill="#e8c840"/>
            <rect x="4" y="21" width="44" height="3" rx="1.5" fill="#c8a020"/>
            <rect x="11" y="16" width="30" height="3" rx="1.5" fill="#f4a0b5"/>
          </svg>
          <div style={{fontSize:'2.8rem',marginBottom:'6px',animation:'pulse 3s infinite'}}>🌸</div>
          <h1 style={{fontSize:'2.4rem',fontWeight:900,color:'#b5245c',margin:0,letterSpacing:'-1px',textShadow:'0 2px 16px rgba(180,36,92,0.15)'}}>
            Her Wishlist
          </h1>
          <p style={{color:'#d07090',fontSize:'0.95rem',margin:'8px 0 0',fontStyle:'italic'}}>
            All the beautiful things Mera bubu loves, in one place ❤️
          </p>
          <div style={{display:'inline-block',marginTop:'12px',background:'#fff8e0',border:'2px solid #c8a020',borderRadius:'8px',padding:'4px 14px',fontSize:'0.72rem',color:'#8b6010',fontWeight:700,letterSpacing:'1px',boxShadow:'0 2px 8px rgba(200,160,30,0.2)'}}>
            ⚓ WANTED: All Beautiful Things ⚓
          </div>
        </div>

        <MetricsBar items={items} />

        {/* Search */}
        <div className="search-wrap">
          <span className="search-icon">🔍</span>
          <input className="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search your wishlist..." />
        </div>

        {/* Tabs */}
        <div className="tabs-scroll">
          <button className="tab-pill" onClick={()=>setActiveTab('all')}
            style={{border:`1.5px solid ${activeTab==='all'?'#c2185b':'#f4b0d0'}`,background:activeTab==='all'?'#c2185b':'#fff',color:activeTab==='all'?'#fff':'#c2185b'}}>
            🌸 All
          </button>
          {CATEGORIES.map(c => (
            <button key={c.id} className="tab-pill"
              onClick={()=>setActiveTab(c.id===activeTab?'all':c.id)}
              style={{border:`1.5px solid ${activeTab===c.id?c.color:'#f4b0d0'}`,background:activeTab===c.id?c.color:'#fff',color:activeTab===c.id?'#fff':c.color}}>
              {c.emoji} {c.label}
              {(items[c.id]||[]).length>0 && (
                <span style={{marginLeft:'4px',background:activeTab===c.id?'rgba(255,255,255,0.3)':c.color+'22',borderRadius:'10px',padding:'0 5px',fontSize:'0.7rem'}}>
                  {items[c.id].length}
                </span>
              )}
            </button>
          ))}
        </div>

        {/* Category Panels */}
        {filteredCats.length===0 && (
          <div style={{textAlign:'center',padding:'40px',color:'#d4a0b8',fontSize:'1rem'}}>
            <div style={{fontSize:'2.5rem',marginBottom:'8px'}}>🌷</div>
            Nothing found for "{search}"
          </div>
        )}
        {filteredCats.map(cat => (
          <CategoryPanel key={cat.id} cat={cat} items={items} onAdd={item=>handleAdd(cat.id,item)} onDelete={handleDelete} />
        ))}

        {/* One Piece section — only on All tab */}
        {activeTab==='all' && (
          <>
            {/* Zoro card */}
            <div style={{margin:'36px 0 16px',background:'linear-gradient(135deg,#0d1a0d 0%,#1a2e10 40%,#0d1a0d 100%)',borderRadius:'20px',padding:'20px 24px',border:'2px solid #5db85d',boxShadow:'0 4px 28px rgba(30,100,30,0.35)',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',opacity:0.06,backgroundImage:'repeating-linear-gradient(135deg,#5db85d 0,#5db85d 1px,transparent 0,transparent 50%)',backgroundSize:'14px 14px'}}/>
              <div style={{display:'flex',alignItems:'center',gap:'18px',position:'relative'}}>
                {/* Zoro SVG */}
                <svg width="80" height="110" viewBox="0 0 80 110" style={{flexShrink:0,animation:'pulse 3s infinite'}}>
                  <ellipse cx="40" cy="22" rx="18" ry="16" fill="#2e8b2e"/>
                  <polygon points="26,14 20,4 28,16" fill="#2e8b2e"/>
                  <polygon points="34,10 30,0 36,12" fill="#2e8b2e"/>
                  <polygon points="42,8 40,0 45,11" fill="#2e8b2e"/>
                  <polygon points="50,10 52,1 54,13" fill="#2e8b2e"/>
                  <polygon points="57,14 62,5 58,17" fill="#2e8b2e"/>
                  <rect x="22" y="20" width="36" height="7" rx="3.5" fill="#e8e8e8"/>
                  <line x1="22" y1="23" x2="58" y2="23" stroke="#ccc" strokeWidth="0.8"/>
                  <ellipse cx="59" cy="22" rx="4" ry="3" fill="#e0e0e0"/>
                  <ellipse cx="40" cy="38" rx="14" ry="14" fill="#f0c080"/>
                  <ellipse cx="34" cy="36" rx="2.5" ry="2.8" fill="#111"/>
                  <circle cx="34.8" cy="35" r="0.8" fill="#fff"/>
                  <line x1="44" y1="31" x2="47" y2="42" stroke="#c84040" strokeWidth="2" strokeLinecap="round"/>
                  <line x1="42" y1="36" x2="49" y2="38" stroke="#c84040" strokeWidth="1.2" strokeLinecap="round" opacity="0.6"/>
