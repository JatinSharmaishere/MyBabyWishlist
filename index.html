<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Her Wishlist"/>
<title>Her Wishlist 🌸</title>
<link rel="apple-touch-icon" sizes="512x512" href="icon.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon.png"/>
<meta name="theme-color" content="#fce4f0"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{height:100%;overflow-x:hidden;}
  body{
    font-family:-apple-system,'Georgia',serif;
    background:linear-gradient(160deg,#fff0f6 0%,#fce4f0 40%,#f9d8eb 100%);
    min-height:100vh;
    min-height:-webkit-fill-available;
    /* iPhone 15 safe areas */
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  input,button,textarea,select{
    font-family:-apple-system,'Georgia',serif;
    -webkit-appearance:none;
    appearance:none;
    font-size:16px; /* prevents iOS zoom on focus */
  }
  /* prevent double-tap zoom on buttons */
  button{touch-action:manipulation;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#f4b0d0;border-radius:10px;}

  @keyframes floatDown{0%{transform:translateY(-2rem) rotate(0deg);opacity:0;}10%{opacity:0.32;}90%{opacity:0.32;}100%{transform:translateY(105vh) rotate(360deg);opacity:0;}}
  @keyframes popIn{0%{transform:scale(0.75);opacity:0;}70%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}
  @keyframes slideDown{0%{max-height:0;opacity:0;transform:translateY(-6px);}100%{max-height:2000px;opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

  .petal{position:fixed;top:-2rem;pointer-events:none;animation:floatDown linear infinite;opacity:0.32;}

  /* tabs row */
  .tabs-scroll{
    display:flex;gap:8px;
    overflow-x:auto;
    padding:4px 0 12px;
    margin-bottom:20px;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .tabs-scroll::-webkit-scrollbar{display:none;}

  /* tab pill — min 44px tall for iOS HIG */
  .tab-pill{
    flex-shrink:0;
    min-height:44px;
    padding:0 16px;
    border-radius:50px;
    font-weight:700;
    font-size:0.88rem;
    cursor:pointer;
    transition:all 0.2s;
    white-space:nowrap;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }

  /* metric cards */
  .metric-card{
    flex:1 1 100px;
    background:linear-gradient(135deg,#fff0f6 0%,#ffe4f0 100%);
    border:1.5px solid #f4c0d8;
    border-radius:20px;
    padding:16px 12px;
    text-align:center;
    box-shadow:0 2px 12px rgba(220,100,150,0.10);
  }

  /* category panel */
  .cat-panel{border-radius:22px;margin-bottom:14px;overflow:hidden;transition:all 0.3s cubic-bezier(.4,0,.2,1);}

  /* category button — min 54px tall */
  .cat-btn{
    width:100%;display:flex;align-items:center;gap:14px;
    min-height:54px;
    padding:14px 18px;
    background:transparent;border:none;cursor:pointer;text-align:left;
    -webkit-tap-highlight-color:transparent;
  }
  .cat-body{padding:0 16px 18px;animation:slideDown 0.3s ease;}

  /* link card */
  .link-card{
    background:#fff;border-radius:16px;
    padding:14px 14px;margin-bottom:10px;
    display:flex;align-items:flex-start;gap:12px;
    animation:popIn 0.35s ease;
    box-shadow:0 2px 10px rgba(200,100,150,0.09);
  }

  /* buttons — all min 44px tall */
  .add-link-btn{
    width:100%;min-height:48px;border-radius:16px;
    font-weight:700;font-size:1rem;cursor:pointer;
    transition:all 0.2s;display:flex;align-items:center;justify-content:center;
  }
  .save-btn{
    flex:1;color:#fff;border:none;border-radius:14px;
    min-height:48px;font-weight:700;font-size:1rem;
    cursor:pointer;transition:transform 0.15s;
    display:flex;align-items:center;justify-content:center;
  }
  .cancel-btn{
    min-height:48px;padding:0 18px;
    background:#fff;border:1.5px solid #f4b0d0;
    border-radius:14px;color:#c06090;
    font-weight:600;font-size:0.95rem;cursor:pointer;
    display:flex;align-items:center;
  }
  .copy-btn{
    min-height:36px;min-width:64px;
    background:#fde8f4;border:none;border-radius:10px;
    padding:0 10px;cursor:pointer;font-size:0.8rem;
    color:#b5245c;font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .del-btn{
    min-height:36px;min-width:36px;
    background:#fff0f4;border:none;border-radius:10px;
    padding:0 10px;cursor:pointer;font-size:0.8rem;
    color:#e57090;font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }

  /* form */
  .form-box{background:linear-gradient(135deg,#fff0f6,#fde8f2);border:1.5px solid #f4c0d8;border-radius:18px;padding:16px;animation:popIn 0.3s ease;}
  .form-input{
    width:100%;padding:13px 14px;
    border-radius:12px;border:1.5px solid #f4b0d0;
    font-size:16px; /* no iOS zoom */
    outline:none;background:#fff;color:#8b3060;
  }
  .form-label{display:block;font-size:0.8rem;color:#c06090;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}

  .empty-state{text-align:center;padding:24px 0;color:#d4a0b8;font-size:0.95rem;}

  .search-wrap{position:relative;margin-bottom:20px;}
  .search-input{
    width:100%;min-height:48px;
    padding:0 16px 0 44px;
    border-radius:50px;border:1.5px solid #f4b0d0;
    background:#fff;font-size:16px;color:#8b3060;
    outline:none;box-shadow:0 2px 12px rgba(200,100,150,0.10);
  }
  .search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none;}

  .sword-badge{background:#1a3a1a;border:1px solid #3a7a3a;border-radius:20px;padding:4px 12px;font-size:0.75rem;color:#8fd88f;font-weight:600;}

  /* main content padding accounts for safe areas */
  .main-content{
    max-width:480px;
    margin:0 auto;
    padding:20px 16px 100px;
    position:relative;z-index:1;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATEGORIES = [
  { id:"makeup",      label:"Makeup",             emoji:"💄", color:"#f4a0b5", light:"#fde8f0" },
  { id:"skincare",    label:"Skincare & Beauty",  emoji:"✨", color:"#e8a0c8", light:"#fce8f6" },
  { id:"dress",       label:"Dresses",            emoji:"👗", color:"#d48fb0", light:"#fae0ef" },
  { id:"tops",        label:"Tops & Blouses",     emoji:"👚", color:"#c97aad", light:"#f7d6ee" },
  { id:"bottoms",     label:"Bottoms",            emoji:"👖", color:"#b86fa2", light:"#f3ccec" },
  { id:"traditional", label:"Traditional Wear",  emoji:"🥻", color:"#a86298", light:"#f0c4e8" },
  { id:"accessories", label:"Accessories",        emoji:"👜", color:"#e8a0b4", light:"#fde8f0" },
  { id:"shoes",       label:"Shoes & Heels",      emoji:"👠", color:"#d490a8", light:"#fad8e8" },
  { id:"jewellery",   label:"Jewellery",          emoji:"💍", color:"#c880a0", light:"#f6d0e4" },
  { id:"hygiene",     label:"Hygiene & Self-care",emoji:"🧴", color:"#de9fc0", light:"#fce4f2" },
];

const HEARTS = ["💗","💕","💖","💝","🌸","✿"];
const FLOATIES = ["🌸","💕","✨","💗","🌷","💖","🦋","🌺","⚓","🏴‍☠️","🌸","💕"];

function FloatingPetals() {
  useEffect(() => {
    const container = document.getElementById('petals-container');
    if (!container) return;
    FLOATIES.forEach((emoji, i) => {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = emoji;
      el.style.left = `${(i * 8.3) + (Math.random()*4)}%`;
      el.style.animationDelay = `${i * 0.7}s`;
      el.style.animationDuration = `${7 + (i % 4)}s`;
      el.style.fontSize = i % 3 === 0 ? '1.3rem' : i % 2 === 0 ? '1rem' : '0.8rem';
      container.appendChild(el);
    });
  }, []);
  return <div id="petals-container" style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',overflow:'hidden',zIndex:0}}/>;
}

function MetricsBar({ items }) {
  const allItems = Object.values(items).flat();
  const total = allItems.length;
  const totalPrice = allItems.reduce((s,i) => s+(parseFloat(i.price)||0), 0);
  const catCount = Object.values(items).filter(a=>a.length>0).length;
  const metrics = [
    {label:"Items",      value:total,                                                          emoji:"🛍️"},
    {label:"Categories", value:`${catCount}/${CATEGORIES.length}`,                            emoji:"📂"},
    {label:"Total Value",value:totalPrice>0?`₹${totalPrice.toLocaleString('en-IN')}`:"—",    emoji:"💰"},
  ];
  return (
    <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'24px',animation:'popIn 0.5s ease'}}>
      {metrics.map(m=>(
        <div key={m.label} className="metric-card">
          <div style={{fontSize:'1.6rem',marginBottom:'4px'}}>{m.emoji}</div>
          <div style={{fontSize:'1.4rem',fontWeight:700,color:'#c2185b',letterSpacing:'-0.5px'}}>{m.value}</div>
          <div style={{fontSize:'0.7rem',color:'#c06090',marginTop:'2px',letterSpacing:'0.3px',textTransform:'uppercase',fontWeight:600}}>{m.label}</div>
        </div>
      ))}
    </div>
  );
}

function LinkCard({ item, onDelete, catColor }) {
  const [copied, setCopied] = useState(false);
  const heart = HEARTS[Math.floor(Math.random()*HEARTS.length)];
  const handleCopy = () => {
    navigator.clipboard.writeText(item.url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});
  };
  const short = item.url.length>50 ? item.url.slice(0,50)+'…' : item.url;
  return (
    <div className="link-card" style={{borderLeft:`4px solid ${catColor}`,border:`1.5px solid ${catColor}33`,borderLeft:`4px solid ${catColor}`}}>
      <div style={{fontSize:'1.2rem',marginTop:'2px',flexShrink:0}}>{heart}</div>
      <div style={{flex:1,minWidth:0}}>
        <a href={item.url} target="_blank" rel="noopener noreferrer"
          style={{color:'#b5245c',fontSize:'0.85rem',wordBreak:'break-all',textDecoration:'none',display:'block',marginBottom:'5px',fontWeight:500,lineHeight:1.4}}>
          {short}
        </a>
        {item.note && <div style={{fontSize:'0.82rem',color:'#c07090',marginBottom:'5px',fontStyle:'italic'}}>📝 {item.note}</div>}
        {item.price && <div style={{display:'inline-block',background:'linear-gradient(90deg,#fce4f0,#f9d0e8)',color:'#b5245c',fontSize:'0.82rem',padding:'3px 12px',borderRadius:'20px',fontWeight:700,border:'1px solid #f4b0d0'}}>₹{parseFloat(item.price).toLocaleString('en-IN')}</div>}
        <div style={{fontSize:'0.72rem',color:'#d4a0b8',marginTop:'5px'}}>{item.date}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'6px',flexShrink:0}}>
        <button className="copy-btn" onClick={handleCopy} style={{background:copied?'#f4c0d8':'#fde8f4'}}>{copied?'✓':'Copy'}</button>
        <button className="del-btn" onClick={onDelete}>✕</button>
      </div>
    </div>
  );
}

function CategoryPanel({ cat, items, onAdd, onDelete }) {
  const [open, setOpen] = useState(false);
  const [url, setUrl] = useState('');
  const [price, setPrice] = useState('');
  const [note, setNote] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [err, setErr] = useState('');
  const inputRef = useRef();
  const catItems = items[cat.id]||[];

  const handleAdd = () => {
    if (!url.trim()){setErr('Please paste a link first 🌸');return;}
    try{new URL(url.trim());}catch{setErr("Hmm, doesn't look like a valid link 🤔");return;}
    onAdd({url:url.trim(),price:price.trim(),note:note.trim(),date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})});
    setUrl('');setPrice('');setNote('');setErr('');setShowForm(false);
  };

  return (
    <div className="cat-panel" style={{
      background:open?`linear-gradient(135deg,${cat.light} 0%,#fff 60%)`:'#fff',
      border:`1.5px solid ${open?cat.color+'99':'#f0d0e0'}`,
      boxShadow:open?`0 6px 28px ${cat.color}22`:'0 2px 10px rgba(200,100,150,0.07)',
    }}>
      <button className="cat-btn" onClick={()=>{setOpen(o=>!o);setShowForm(false);}}>
        <span style={{fontSize:'1.7rem'}}>{cat.emoji}</span>
        <span style={{flex:1,fontWeight:700,fontSize:'1rem',color:open?cat.color:'#8b3060'}}>{cat.label}</span>
        {catItems.length>0&&(
          <span style={{background:`linear-gradient(135deg,${cat.color},${cat.color}cc)`,color:'#fff',borderRadius:'20px',padding:'3px 11px',fontSize:'0.78rem',fontWeight:700,flexShrink:0}}>
            {catItems.length}
          </span>
        )}
        <span style={{fontSize:'1.1rem',color:cat.color,transform:open?'rotate(180deg)':'rotate(0)',transition:'transform 0.3s',flexShrink:0,marginLeft:'4px'}}>▾</span>
      </button>

      {open&&(
        <div className="cat-body">
          {catItems.length===0&&!showForm&&(
            <div className="empty-state">
              <div style={{fontSize:'2.2rem',marginBottom:'8px'}}>🛒</div>
              Nothing saved yet — add your first find!
            </div>
          )}
          {catItems.map((item,i)=>(
            <LinkCard key={i} item={item} catColor={cat.color} onDelete={()=>onDelete(cat.id,i)}/>
          ))}

          {showForm?(
            <div className="form-box">
              <div style={{marginBottom:'12px'}}>
                <label className="form-label">Paste Product Link 🔗</label>
                <input ref={inputRef} className="form-input" value={url}
                  onChange={e=>{setUrl(e.target.value);setErr('');}}
                  placeholder="https://..." autoCorrect="off" autoCapitalize="off"/>
              </div>
              <div style={{display:'flex',gap:'10px',marginBottom:'12px'}}>
                <div style={{flex:1}}>
                  <label className="form-label">Price (₹)</label>
                  <input className="form-input" value={price} onChange={e=>setPrice(e.target.value)} type="number" placeholder="1299" inputMode="numeric"/>
                </div>
                <div style={{flex:2}}>
                  <label className="form-label">Note</label>
                  <input className="form-input" value={note} onChange={e=>setNote(e.target.value)} placeholder="Size M, red colour…"/>
                </div>
              </div>
              {err&&<div style={{color:'#e05070',fontSize:'0.85rem',marginBottom:'10px'}}>{err}</div>}
              <div style={{display:'flex',gap:'8px'}}>
                <button className="save-btn" onClick={handleAdd}
                  style={{background:`linear-gradient(135deg,${cat.color},${cat.color}bb)`,boxShadow:`0 3px 12px ${cat.color}55`}}>
                  💖 Save
                </button>
                <button className="cancel-btn" onClick={()=>{setShowForm(false);setErr('');setUrl('');setPrice('');setNote('');}}>Cancel</button>
              </div>
            </div>
          ):(
            <button className="add-link-btn"
              style={{background:cat.light,border:`1.5px dashed ${cat.color}88`,color:cat.color,marginTop:catItems.length>0?'10px':'0'}}
              onTouchStart={e=>{e.currentTarget.style.background=cat.color;e.currentTarget.style.color='#fff';}}
              onTouchEnd={e=>{e.currentTarget.style.background=cat.light;e.currentTarget.style.color=cat.color;}}
              onMouseEnter={e=>{e.currentTarget.style.background=cat.color;e.currentTarget.style.color='#fff';e.currentTarget.style.borderStyle='solid';}}
              onMouseLeave={e=>{e.currentTarget.style.background=cat.light;e.currentTarget.style.color=cat.color;e.currentTarget.style.borderStyle='dashed';}}
              onClick={()=>{setShowForm(true);setTimeout(()=>inputRef.current&&inputRef.current.focus(),120);}}>
              + Add a link
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [items, setItems] = useState(()=>{
    try{const s=localStorage.getItem('her_wishlist_v1');return s?JSON.parse(s):Object.fromEntries(CATEGORIES.map(c=>[c.id,[]]));}
    catch{return Object.fromEntries(CATEGORIES.map(c=>[c.id,[]]));}
  });
  const [search, setSearch] = useState('');
  const [activeTab, setActiveTab] = useState('all');

  useEffect(()=>{try{localStorage.setItem('her_wishlist_v1',JSON.stringify(items));}catch{}},[items]);

  const handleAdd=(catId,item)=>setItems(prev=>({...prev,[catId]:[...(prev[catId]||[]),item]}));
  const handleDelete=(catId,idx)=>setItems(prev=>({...prev,[catId]:prev[catId].filter((_,i)=>i!==idx)}));

  const filteredCats = CATEGORIES.filter(c=>{
    if(activeTab!=='all'&&c.id!==activeTab) return false;
    if(search){
      const s=search.toLowerCase();
      return c.label.toLowerCase().includes(s)||(items[c.id]||[]).some(i=>i.url.toLowerCase().includes(s)||(i.note||'').toLowerCase().includes(s));
    }
    return true;
  });

  return (
    <div style={{minHeight:'100vh',position:'relative'}}>
      <FloatingPetals/>
      <div className="main-content">

        {/* ── Header ── */}
        <div style={{textAlign:'center',marginBottom:'28px',position:'relative',paddingTop:'8px'}}>
          <svg width="44" height="44" viewBox="0 0 44 44" style={{position:'absolute',left:0,top:'12px',opacity:0.65,animation:'pulse 4s infinite 0.5s'}}>
            <circle cx="22" cy="26" r="16" fill="#ff8c42"/>
            <ellipse cx="22" cy="12" rx="3" ry="6" fill="#4a8c3f"/>
            <ellipse cx="17" cy="13" rx="5" ry="2.5" fill="#4a8c3f" transform="rotate(-20 17 13)"/>
            <ellipse cx="27" cy="13" rx="5" ry="2.5" fill="#4a8c3f" transform="rotate(20 27 13)"/>
            <circle cx="18" cy="24" r="2" fill="#ff6b1a" opacity="0.5"/>
          </svg>
          <svg width="50" height="30" viewBox="0 0 52 32" style={{position:'absolute',right:0,top:'4px',opacity:0.65,animation:'pulse 3.5s infinite 1s'}}>
            <ellipse cx="26" cy="22" rx="24" ry="7" fill="#e8c840"/>
            <ellipse cx="26" cy="17" rx="14" ry="10" fill="#e8c840"/>
            <rect x="4" y="21" width="44" height="3" rx="1.5" fill="#c8a020"/>
            <rect x="11" y="16" width="30" height="3" rx="1.5" fill="#f4a0b5"/>
          </svg>
          <div style={{fontSize:'3rem',marginBottom:'4px',animation:'pulse 3s infinite'}}>🌸</div>
          <h1 style={{fontSize:'2.2rem',fontWeight:900,color:'#b5245c',margin:0,letterSpacing:'-1px',textShadow:'0 2px 16px rgba(180,36,92,0.15)',lineHeight:1.1}}>
            Her Wishlist
          </h1>
          <p style={{color:'#d07090',fontSize:'0.9rem',margin:'8px 0 0',fontStyle:'italic',lineHeight:1.5,padding:'0 40px'}}>
            All the beautiful things Mera bubu loves, in one place ❤️
          </p>
          <div style={{display:'inline-block',marginTop:'12px',background:'#fff8e0',border:'2px solid #c8a020',borderRadius:'10px',padding:'5px 16px',fontSize:'0.72rem',color:'#8b6010',fontWeight:700,letterSpacing:'1px'}}>
            ⚓ WANTED: All Beautiful Things ⚓
          </div>
        </div>

        <MetricsBar items={items}/>

        {/* ── Search ── */}
        <div className="search-wrap">
          <span className="search-icon">🔍</span>
          <input className="search-input" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search your wishlist…" autoCorrect="off" autoCapitalize="off"/>
        </div>

        {/* ── Tabs ── */}
        <div className="tabs-scroll">
          <button className="tab-pill" onClick={()=>setActiveTab('all')}
            style={{border:`1.5px solid ${activeTab==='all'?'#c2185b':'#f4b0d0'}`,background:activeTab==='all'?'#c2185b':'#fff',color:activeTab==='all'?'#fff':'#c2185b'}}>
            🌸 All
          </button>
          {CATEGORIES.map(c=>(
            <button key={c.id} className="tab-pill"
              onClick={()=>setActiveTab(c.id===activeTab?'all':c.id)}
              style={{border:`1.5px solid ${activeTab===c.id?c.color:'#f4b0d0'}`,background:activeTab===c.id?c.color:'#fff',color:activeTab===c.id?'#fff':c.color}}>
              {c.emoji} {c.label}
              {(items[c.id]||[]).length>0&&(
                <span style={{background:activeTab===c.id?'rgba(255,255,255,0.35)':c.color+'25',borderRadius:'10px',padding:'1px 6px',fontSize:'0.75rem',marginLeft:'2px'}}>
                  {items[c.id].length}
                </span>
              )}
            </button>
          ))}
        </div>

        {/* ── Category Panels ── */}
        {filteredCats.length===0&&(
          <div style={{textAlign:'center',padding:'48px 0',color:'#d4a0b8',fontSize:'1rem'}}>
            <div style={{fontSize:'2.5rem',marginBottom:'10px'}}>🌷</div>
            Nothing found for "{search}"
          </div>
        )}
        {filteredCats.map(cat=>(
          <CategoryPanel key={cat.id} cat={cat} items={items} onAdd={item=>handleAdd(cat.id,item)} onDelete={handleDelete}/>
