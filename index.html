<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Her Wishlist"/>
<title>Her Wishlist 🌸</title>
<link rel="apple-touch-icon" sizes="512x512" href="icon.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon.png"/>
<meta name="theme-color" content="#fce4f0"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{height:100%;overflow-x:hidden;}
  body{
    font-family:-apple-system,'Georgia',serif;
    background:linear-gradient(160deg,#fff0f6 0%,#fce4f0 40%,#f9d8eb 100%);
    min-height:100vh;min-height:-webkit-fill-available;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  input,button,textarea,select{
    font-family:-apple-system,'Georgia',serif;
    -webkit-appearance:none;appearance:none;font-size:16px;
  }
  button{touch-action:manipulation;}

  /* ── Animations ── */
  @keyframes floatDown{0%{transform:translateY(-2rem) rotate(0deg);opacity:0;}10%{opacity:0.30;}90%{opacity:0.30;}100%{transform:translateY(105vh) rotate(360deg);opacity:0;}}
  @keyframes popIn{0%{transform:scale(0.82) translateY(8px);opacity:0;}60%{transform:scale(1.03) translateY(-2px);}100%{transform:scale(1) translateY(0);opacity:1;}}
  @keyframes fadeSlideDown{0%{opacity:0;transform:translateY(-12px);}100%{opacity:1;transform:translateY(0);}}
  @keyframes fadeSlideUp{0%{opacity:0;transform:translateY(12px);}100%{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes shimmer{0%{opacity:0.7;}50%{opacity:1;}100%{opacity:0.7;}}
  @keyframes cardIn{0%{opacity:0;transform:translateX(-10px);}100%{opacity:1;transform:translateX(0);}}
  @keyframes modalIn{0%{opacity:0;transform:scale(0.94) translateY(20px);}100%{opacity:1;transform:scale(1) translateY(0);}}
  @keyframes overlayIn{0%{opacity:0;}100%{opacity:1;}}

  .petal{position:fixed;top:-2rem;pointer-events:none;animation:floatDown linear infinite;opacity:0.28;}

  /* ── Layout ── */
  .main-content{max-width:480px;margin:0 auto;padding:20px 16px 100px;position:relative;z-index:1;}

  /* ── Tabs ── */
  .tabs-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;margin-bottom:20px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .tabs-scroll::-webkit-scrollbar{display:none;}
  .tab-pill{flex-shrink:0;min-height:44px;padding:0 16px;border-radius:50px;font-weight:700;font-size:0.88rem;cursor:pointer;transition:all 0.25s cubic-bezier(.4,0,.2,1);white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}

  /* ── Metric cards ── */
  .metric-card{flex:1 1 100px;background:linear-gradient(135deg,#fff0f6 0%,#ffe4f0 100%);border:1.5px solid #f4c0d8;border-radius:20px;padding:16px 12px;text-align:center;box-shadow:0 2px 12px rgba(220,100,150,0.10);animation:fadeSlideUp 0.5s ease both;}

  /* ── Category panel ── */
  .cat-panel{border-radius:22px;margin-bottom:12px;overflow:hidden;transition:box-shadow 0.3s ease,border-color 0.3s ease,background 0.3s ease;}
  .cat-btn{width:100%;display:flex;align-items:center;gap:14px;min-height:56px;padding:14px 18px;background:transparent;border:none;cursor:pointer;text-align:left;}
  .cat-body{padding:0 16px 18px;}

  /* ── Panel body slide ── */
  .panel-enter{animation:fadeSlideDown 0.28s cubic-bezier(.4,0,.2,1) both;}

  /* ── Link card ── */
  .link-card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 2px 10px rgba(200,100,150,0.09);animation:cardIn 0.3s ease both;transition:box-shadow 0.2s ease;}
  .link-card:active{box-shadow:0 1px 4px rgba(200,100,150,0.12);}

  /* ── Buttons ── */
  .add-link-btn{width:100%;min-height:50px;border-radius:16px;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.22s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;gap:6px;}
  .save-btn{flex:1;color:#fff;border:none;border-radius:14px;min-height:50px;font-weight:700;font-size:1rem;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .save-btn:active{transform:scale(0.97);}
  .cancel-btn{min-height:50px;padding:0 18px;background:#fff;border:1.5px solid #f4b0d0;border-radius:14px;color:#c06090;font-weight:600;font-size:0.95rem;cursor:pointer;display:flex;align-items:center;transition:background 0.2s;}
  .cancel-btn:active{background:#fde8f4;}
  .copy-btn{min-height:36px;min-width:60px;background:#fde8f4;border:none;border-radius:10px;padding:0 10px;cursor:pointer;font-size:0.8rem;color:#b5245c;font-weight:600;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
  .del-btn{min-height:36px;min-width:36px;background:#fff0f4;border:none;border-radius:10px;padding:0 10px;cursor:pointer;font-size:0.8rem;color:#e57090;font-weight:600;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
  .del-btn:active{background:#ffd0d8;}

  /* ── Form ── */
  .form-box{background:linear-gradient(135deg,#fff0f6,#fde8f2);border:1.5px solid #f4c0d8;border-radius:18px;padding:16px;animation:modalIn 0.3s cubic-bezier(.4,0,.2,1) both;}
  .form-input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid #f4b0d0;font-size:16px;outline:none;background:#fff;color:#8b3060;transition:border-color 0.2s,box-shadow 0.2s;}
  .form-input:focus{border-color:#f4a0b5;box-shadow:0 0 0 3px rgba(244,160,181,0.25);}
  .form-label{display:block;font-size:0.8rem;color:#c06090;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}

  /* ── Add Category modal ── */
  .overlay{position:fixed;inset:0;background:rgba(180,60,100,0.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:overlayIn 0.2s ease;}
  .modal-sheet{background:#fff;border-radius:28px 28px 0 0;padding:28px 20px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:480px;animation:modalIn 0.32s cubic-bezier(.4,0,.2,1);}

  .empty-state{text-align:center;padding:24px 0;color:#d4a0b8;font-size:0.95rem;}
  .search-wrap{position:relative;margin-bottom:20px;}
  .search-input{width:100%;min-height:48px;padding:0 16px 0 44px;border-radius:50px;border:1.5px solid #f4b0d0;background:#fff;font-size:16px;color:#8b3060;outline:none;box-shadow:0 2px 12px rgba(200,100,150,0.10);transition:border-color 0.2s,box-shadow 0.2s;}
  .search-input:focus{border-color:#f4a0b5;box-shadow:0 0 0 3px rgba(244,160,181,0.20);}
  .search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none;}
  .sword-badge{background:#1a3a1a;border:1px solid #3a7a3a;border-radius:20px;padding:4px 12px;font-size:0.75rem;color:#8fd88f;font-weight:600;}

  /* emoji grid for custom category */
  .emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:10px 0;}
  .emoji-btn{font-size:1.4rem;border:2px solid transparent;border-radius:10px;padding:6px;cursor:pointer;background:transparent;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
  .emoji-btn.selected{border-color:#f4a0b5;background:#fde8f4;}

  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-thumb{background:#f4b0d0;border-radius:10px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const DEFAULT_CATEGORIES = [
  { id:"makeup",      label:"Makeup",             emoji:"💄", color:"#f4a0b5", light:"#fde8f0" },
  { id:"skincare",    label:"Skincare & Beauty",  emoji:"✨", color:"#e8a0c8", light:"#fce8f6" },
  { id:"dress",       label:"Dresses",            emoji:"👗", color:"#d48fb0", light:"#fae0ef" },
  { id:"tops",        label:"Tops & Blouses",     emoji:"👚", color:"#c97aad", light:"#f7d6ee" },
  { id:"bottoms",     label:"Bottoms",            emoji:"👖", color:"#b86fa2", light:"#f3ccec" },
  { id:"traditional", label:"Traditional Wear",  emoji:"🥻", color:"#a86298", light:"#f0c4e8" },
  { id:"accessories", label:"Accessories",        emoji:"👜", color:"#e8a0b4", light:"#fde8f0" },
  { id:"shoes",       label:"Shoes & Heels",      emoji:"👠", color:"#d490a8", light:"#fad8e8" },
  { id:"jewellery",   label:"Jewellery",          emoji:"💍", color:"#c880a0", light:"#f6d0e4" },
  { id:"hygiene",     label:"Hygiene & Self-care",emoji:"🧴", color:"#de9fc0", light:"#fce4f2" },
  { id:"novels",      label:"Novels & Books",     emoji:"📚", color:"#b89fd0", light:"#efe8f8" },
  { id:"perfumes",    label:"Perfumes",           emoji:"🌹", color:"#e898b8", light:"#fde0ef" },
];

const EMOJI_OPTIONS = ["🎀","🧸","🎭","🎨","🎵","🎮","🏠","🌿","🍰","☕","🕯️","🧶","🪞","🛁","🧣","🎒","📷","🌙","⭐","🦄","🍓","🌺","💎","🪷","🫧","🧁","🎪","🌈"];
const CAT_COLORS = [
  {color:"#f4a0b5",light:"#fde8f0"},{color:"#e8a0c8",light:"#fce8f6"},
  {color:"#d48fb0",light:"#fae0ef"},{color:"#c97aad",light:"#f7d6ee"},
  {color:"#b86fa2",light:"#f3ccec"},{color:"#a86298",light:"#f0c4e8"},
  {color:"#b89fd0",light:"#efe8f8"},{color:"#e898b8",light:"#fde0ef"},
  {color:"#de9fc0",light:"#fce4f2"},{color:"#d490a8",light:"#fad8e8"},
];

const HEARTS = ["💗","💕","💖","💝","🌸","✿"];
const FLOATIES = ["🌸","💕","✨","💗","🌷","💖","🦋","🌺","⚓","🏴‍☠️","🌸","💕"];

function FloatingPetals() {
  useEffect(() => {
    const container = document.getElementById('petals-container');
    if (!container) return;
    FLOATIES.forEach((emoji, i) => {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = emoji;
      el.style.left = `${(i*8.3)+(Math.random()*4)}%`;
      el.style.animationDelay = `${i*0.7}s`;
      el.style.animationDuration = `${7+(i%4)}s`;
      el.style.fontSize = i%3===0?'1.3rem':i%2===0?'1rem':'0.8rem';
      container.appendChild(el);
    });
  }, []);
  return <div id="petals-container" style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',overflow:'hidden',zIndex:0}}/>;
}

/* ── Add Category Modal ── */
function AddCategoryModal({ onAdd, onClose }) {
  const [name, setName] = useState('');
  const [emoji, setEmoji] = useState('🎀');
  const [colorIdx, setColorIdx] = useState(0);
  const [err, setErr] = useState('');

  const handleAdd = () => {
    if (!name.trim()) { setErr('Give your category a name 🌸'); return; }
    const c = CAT_COLORS[colorIdx];
    onAdd({
      id: 'custom_' + Date.now(),
      label: name.trim(),
      emoji,
      color: c.color,
      light: c.light,
    });
    onClose();
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-sheet">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
          <h2 style={{fontSize:'1.2rem',fontWeight:800,color:'#b5245c'}}>✨ New Category</h2>
          <button onClick={onClose} style={{background:'#fde8f4',border:'none',borderRadius:'50%',width:'36px',height:'36px',cursor:'pointer',fontSize:'1.1rem',color:'#c06090',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>

        <label className="form-label">Category Name</label>
        <input className="form-input" value={name} onChange={e=>{setName(e.target.value);setErr('');}}
          placeholder="e.g. Candles, Stationery…" style={{marginBottom:'16px'}} autoFocus/>

        <label className="form-label">Pick an Emoji</label>
        <div className="emoji-grid" style={{marginBottom:'16px'}}>
          {EMOJI_OPTIONS.map(e=>(
            <button key={e} className={`emoji-btn${emoji===e?' selected':''}`} onClick={()=>setEmoji(e)}>{e}</button>
          ))}
        </div>

        <label className="form-label">Pick a Colour</label>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'20px'}}>
          {CAT_COLORS.map((c,i)=>(
            <button key={i} onClick={()=>setColorIdx(i)} style={{width:'32px',height:'32px',borderRadius:'50%',background:c.color,border:colorIdx===i?'3px solid #8b3060':'3px solid transparent',cursor:'pointer',transition:'border 0.15s'}}/>
          ))}
        </div>

        {err && <div style={{color:'#e05070',fontSize:'0.85rem',marginBottom:'12px'}}>{err}</div>}

        <div style={{display:'flex',gap:'8px'}}>
          <button className="save-btn" onClick={handleAdd}
            style={{background:'linear-gradient(135deg,#f4a0b5,#c97aad)',boxShadow:'0 3px 12px rgba(244,160,181,0.5)'}}>
            💖 Add Category
          </button>
          <button className="cancel-btn" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function MetricsBar({ items }) {
  const allItems = Object.values(items).flat();
  const total = allItems.length;
  const totalPrice = allItems.reduce((s,i)=>s+(parseFloat(i.price)||0),0);
  const catCount = Object.keys(items).filter(k=>items[k].length>0).length;
  const metrics = [
    {label:"Items",value:total,emoji:"🛍️"},
    {label:"Categories",value:catCount,emoji:"📂"},
    {label:"Total",value:totalPrice>0?`₹${totalPrice.toLocaleString('en-IN')}`:"—",emoji:"💰"},
  ];
  return (
    <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginBottom:'24px'}}>
      {metrics.map((m,i)=>(
        <div key={m.label} className="metric-card" style={{animationDelay:`${i*0.1}s`}}>
          <div style={{fontSize:'1.6rem',marginBottom:'4px'}}>{m.emoji}</div>
          <div style={{fontSize:'1.4rem',fontWeight:700,color:'#c2185b',letterSpacing:'-0.5px'}}>{m.value}</div>
          <div style={{fontSize:'0.7rem',color:'#c06090',marginTop:'2px',letterSpacing:'0.3px',textTransform:'uppercase',fontWeight:600}}>{m.label}</div>
        </div>
      ))}
    </div>
  );
}

function LinkCard({ item, onDelete, catColor, idx }) {
  const [copied, setCopied] = useState(false);
  const heart = HEARTS[idx % HEARTS.length];
  const handleCopy = () => {
    navigator.clipboard.writeText(item.url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});
  };
  const short = item.url.length>48 ? item.url.slice(0,48)+'…' : item.url;
  return (
    <div className="link-card" style={{borderLeft:`4px solid ${catColor}`,animationDelay:`${idx*0.06}s`}}>
      <div style={{fontSize:'1.2rem',marginTop:'2px',flexShrink:0}}>{heart}</div>
      <div style={{flex:1,minWidth:0}}>
        <a href={item.url} target="_blank" rel="noopener noreferrer"
          style={{color:'#b5245c',fontSize:'0.85rem',wordBreak:'break-all',textDecoration:'none',display:'block',marginBottom:'5px',fontWeight:500,lineHeight:1.4}}>
          {short}
        </a>
        {item.note && <div style={{fontSize:'0.82rem',color:'#c07090',marginBottom:'5px',fontStyle:'italic'}}>📝 {item.note}</div>}
        {item.price && <div style={{display:'inline-block',background:'linear-gradient(90deg,#fce4f0,#f9d0e8)',color:'#b5245c',fontSize:'0.82rem',padding:'3px 12px',borderRadius:'20px',fontWeight:700,border:'1px solid #f4b0d0'}}>₹{parseFloat(item.price).toLocaleString('en-IN')}</div>}
        <div style={{fontSize:'0.72rem',color:'#d4a0b8',marginTop:'5px'}}>{item.date}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'6px',flexShrink:0}}>
        <button className="copy-btn" onClick={handleCopy} style={{background:copied?'#f4c0d8':'#fde8f4'}}>{copied?'✓':'Copy'}</button>
        <button className="del-btn" onClick={onDelete}>✕</button>
      </div>
    </div>
  );
}

function CategoryPanel({ cat, items, onAdd, onDelete, onDeleteCat, isCustom }) {
  const [open, setOpen] = useState(false);
  const [url, setUrl] = useState('');
  const [price, setPrice] = useState('');
  const [note, setNote] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [err, setErr] = useState('');
  const inputRef = useRef();
  const catItems = items[cat.id]||[];

  const handleAdd = () => {
    if (!url.trim()){setErr('Please paste a link first 🌸');return;}
    try{new URL(url.trim());}catch{setErr("Doesn't look like a valid link 🤔");return;}
    onAdd({url:url.trim(),price:price.trim(),note:note.trim(),date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})});
    setUrl('');setPrice('');setNote('');setErr('');setShowForm(false);
  };

  const toggle = () => { setOpen(o=>!o); setShowForm(false); };

  return (
    <div className="cat-panel" style={{
      background:open?`linear-gradient(135deg,${cat.light} 0%,#fff 60%)`:'#fff',
      border:`1.5px solid ${open?cat.color+'99':'#f0d0e0'}`,
      boxShadow:open?`0 6px 28px ${cat.color}22`:'0 2px 10px rgba(200,100,150,0.07)',
    }}>
      <button className="cat-btn" onClick={toggle}>
        <span style={{fontSize:'1.7rem'}}>{cat.emoji}</span>
        <span style={{flex:1,fontWeight:700,fontSize:'1rem',color:open?cat.color:'#8b3060',transition:'color 0.2s'}}>{cat.label}</span>
        {catItems.length>0&&(
          <span style={{background:`linear-gradient(135deg,${cat.color},${cat.color}cc)`,color:'#fff',borderRadius:'20px',padding:'3px 11px',fontSize:'0.78rem',fontWeight:700,flexShrink:0,transition:'all 0.2s'}}>
            {catItems.length}
          </span>
        )}
        {isCustom && (
          <button onClick={e=>{e.stopPropagation();onDeleteCat(cat.id);}}
            style={{background:'#fff0f4',border:'none',borderRadius:'8px',padding:'4px 7px',cursor:'pointer',fontSize:'0.7rem',color:'#e57090',fontWeight:700,marginLeft:'4px',flexShrink:0}}>
            🗑
          </button>
        )}
        <span style={{fontSize:'1.1rem',color:cat.color,transform:open?'rotate(180deg)':'rotate(0)',transition:'transform 0.3s cubic-bezier(.4,0,.2,1)',flexShrink:0,marginLeft:'4px'}}>▾</span>
      </button>

      {open&&(
        <div className="cat-body panel-enter">
          {catItems.length===0&&!showForm&&(
            <div className="empty-state">
              <div style={{fontSize:'2.2rem',marginBottom:'8px'}}>{cat.emoji}</div>
              Nothing saved yet — add your first find!
            </div>
          )}
          {catItems.map((item,i)=>(
            <LinkCard key={i} idx={i} item={item} catColor={cat.color} onDelete={()=>onDelete(cat.id,i)}/>
          ))}

          {showForm?(
            <div className="form-box">
              <div style={{marginBottom:'12px'}}>
                <label className="form-label">Paste Product Link 🔗</label>
                <input ref={inputRef} className="form-input" value={url}
                  onChange={e=>{setUrl(e.target.value);setErr('');}}
                  placeholder="https://…" autoCorrect="off" autoCapitalize="off"/>
              </div>
              <div style={{display:'flex',gap:'10px',marginBottom:'12px'}}>
                <div style={{flex:1}}>
                  <label className="form-label">Price (₹)</label>
                  <input className="form-input" value={price} onChange={e=>setPrice(e.target.value)} type="number" placeholder="1299" inputMode="numeric"/>
                </div>
                <div style={{flex:2}}>
                  <label className="form-label">Note</label>
                  <input className="form-input" value={note} onChange={e=>setNote(e.target.value)} placeholder="Size M, red…"/>
                </div>
              </div>
              {err&&<div style={{color:'#e05070',fontSize:'0.85rem',marginBottom:'10px'}}>{err}</div>}
              <div style={{display:'flex',gap:'8px'}}>
                <button className="save-btn" onClick={handleAdd}
                  style={{background:`linear-gradient(135deg,${cat.color},${cat.color}bb)`,boxShadow:`0 3px 12px ${cat.color}55`}}>
                  💖 Save
                </button>
                <button className="cancel-btn" onClick={()=>{setShowForm(false);setErr('');setUrl('');setPrice('');setNote('');}}>Cancel</button>
              </div>
            </div>
          ):(
            <button className="add-link-btn"
              style={{background:cat.light,border:`1.5px dashed ${cat.color}88`,color:cat.color,marginTop:catItems.length>0?'10px':'0'}}
              onMouseEnter={e=>{e.currentTarget.style.background=cat.color;e.currentTarget.style.color='#fff';e.currentTarget.style.borderStyle='solid';}}
              onMouseLeave={e=>{e.currentTarget.style.background=cat.light;e.currentTarget.style.color=cat.color;e.currentTarget.style.borderStyle='dashed';}}
              onTouchStart={e=>{e.currentTarget.style.background=cat.color;e.currentTarget.style.color='#fff';}}
              onTouchEnd={e=>{e.currentTarget.style.background=cat.light;e.currentTarget.style.color=cat.color;}}
              onClick={()=>{setShowForm(true);setTimeout(()=>inputRef.current&&inputRef.current.focus(),120);}}>
              + Add a link
            </button>
          )}
        </div>
      )}
    </div>
  );
}
